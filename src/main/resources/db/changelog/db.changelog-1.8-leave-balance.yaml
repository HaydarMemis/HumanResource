databaseChangeLog:
  - changeSet:
      id: "9"
      author: "Burak Talha Memiş"
      changes:
        - createTable:
            tableName: leave_balance
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: employee_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: leave_type_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: used_days
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: NUMERIC(19,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: VARCHAR(1)
                  defaultValue: "N"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addUniqueConstraint:
            tableName: leave_balance
            columnNames: employee_id, leave_type_id
            constraintName: uq_leave_balance_employee_leave_type

        - addForeignKeyConstraint:
            baseTableName: leave_balance
            baseColumnNames: employee_id
            referencedTableName: employee
            referencedColumnNames: id
            constraintName: fk_leave_balance_employee

        - addForeignKeyConstraint:
            baseTableName: leave_balance
            baseColumnNames: leave_type_id
            referencedTableName: leave_type
            referencedColumnNames: id
            constraintName: fk_leave_balance_leave_type
